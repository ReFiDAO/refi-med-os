# Federation Manifest v3.0
# refi-med-os — ReFi Mediterranean Organizational OS instance
# Run `npm run setup` after first clone to fill in identity blanks interactively.

version: "3.0"
spec: "organizational-os/3.0"

# ── Identity ──────────────────────────────────────────────────────────────────
identity:
  name: "ReFi Mediterranean"
  type: "LocalNode"               # DAO | Cooperative | Foundation | Project | LocalNode | Hub
  emoji: "🌊"
  daoURI: "https://refi-mediterranean.org/.well-known/dao.json"  # TBD — confirm domain
  chain: ""                       # TBD via bootstrap interview (e.g., eip155:42220 for Celo)
  safe: ""                        # TBD via bootstrap interview (treasury Safe address)
  hats: null                      # TBD via bootstrap interview (Hats Protocol tree ID)
  gardens: ""                     # TBD via bootstrap interview
  onchain_registration:
    enabled: false
    chain: ""
    contract_address: ""

# ── Federation Network ─────────────────────────────────────────────────────────
federation:
  network: "refi-dao"
  hub: "github.com/ReFiDAO"
  networks:
    - name: "refi-dao"
      role: "primary"
      url: "https://github.com/ReFiDAO"
    - name: "regen-coordination"
      role: "via refi-dao"
      url: "https://github.com/regen-coordination"

peers:
  - name: "ReFi DAO"
    repo: "ReFiDAO/refi-dao-os"
    url: "https://github.com/ReFiDAO/refi-dao-os"
    trust: "read"
  - name: "ReFi Barcelona"
    repo: "refibcn/refi-bcn-os"
    url: "https://github.com/refibcn/refi-bcn-os"
    trust: "read"
  - name: "Regen Coordination"
    repo: "regen-coordination/regen-coordination-os"
    url: "https://github.com/regen-coordination/regen-coordination-os"
    trust: "read"
  - name: "ReFi Mediterranean (knowledge base)"
    repo: "repos/refi-mediterranean"
    url: "https://github.com/ReFiDAO/ReFi-Mediterranean"
    trust: "read-write"

upstream:
  - repository: "https://github.com/regen-coordination/organizational-os-framework"
    last_sync: "2026-04-28"
    sync_frequency: "on-demand"

downstream: []

# ── Agent Configuration ────────────────────────────────────────────────────────
agent:
  runtime: "claude-code"
  workspace: "."
  skills:
    - bootstrap-interviewer
    - org-os-init
    - initialize
    - schema-generator
  channels:
    - github
  proactive: false
  heartbeat_interval: "1h"

# ── Knowledge Commons ─────────────────────────────────────────────────────────
knowledge-commons:
  enabled: false
  shared-domains: []
  sync-protocol: "git"
  publish:
    meetings: false
    projects: false
    funding: false
  subscribe: []

# ── Operational Packages ─────────────────────────────────────────────────────
packages:
  knowledge_base: true
  meetings: false
  projects: false
  finances: false
  coordination: false
  webapps: false
  web3: false
  egregore: false

# ── Governance ────────────────────────────────────────────────────────────────
governance:
  maintainers: []                 # TBD via bootstrap interview
  decision_model: "TBD"           # solo-maintainer | consensus | weighted | etc.

# ── Platforms ─────────────────────────────────────────────────────────────────
platforms:
  primary: "github"
  deployment: "github-pages"
  domain: ""                      # TBD via bootstrap interview
  mirrors: []

# ── Metadata ─────────────────────────────────────────────────────────────────
metadata:
  created: "2026-04-28"
  last_updated: "2026-04-28"
  framework_version: "3.0"
  masterplan_version: "2.0.0"
  scaffolded_from: "regen-coordination/organizational-os-framework@3.0"
